<!DOCTYPE html>
<html>
<head>
  <title>DMart Premium Orders Fixed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{margin:0;font-family:sans-serif;background:#f7f7f7;display:flex;justify-content:center}
    .app{width:100%;max-width:390px;height:100vh;border-radius:20px;overflow:hidden;position:relative;background:#f7f7f7;box-shadow:0 0 20px rgba(0,0,0,0.2);}
    .content{height:100%;overflow-y:auto;padding-bottom:70px;}
    header{background:#6c2bd9;color:#fff;padding:14px;display:flex;justify-content:space-between;align-items:center;}
    .menu{font-size:22px;cursor:pointer}
    .drawer{position:fixed;left:-260px;top:0;width:260px;height:100%;background:#fff;padding:15px;transition:0.3s;z-index:1000}
    .drawer.open{left:0}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
    .card{background:#fff;border-radius:10px;padding:10px}
    img{width:100%;height:100px;object-fit:cover;border-radius:8px}
    button{background:#6c2bd9;color:#fff;border:none;padding:6px;border-radius:6px;margin:3px}
    .footer{position:absolute;bottom:0;width:100%;background:#fff;padding:10px;border-top:1px solid #ddd;z-index:999}
    input,select{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
    .hidden{display:none}
    .page{position:absolute;width:100%;top:0;left:0;height:100%;}
  </style>
</head>
<body>
<div class="app">

<!-- LOGIN PAGE -->
<div id="login" class="page">
<header><h3>Login</h3></header>
<div style="padding:15px">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- DRAWER MENU -->
<div id="drawer" class="drawer">
  <p onclick="openLiked()">❤️ Liked</p>
  <p onclick="openCart()">🛒 Cart</p>
  <p onclick="openOrders()">📦 Orders</p>
  <p onclick="logout()">🚪 Logout</p>
</div>

<!-- HOME PAGE -->
<div id="home" class="page hidden">
<div class="content">
<header>
<span class="menu" onclick="toggleMenu()">☰</span>
<h3>DMart</h3>
</header>
<input id="search" placeholder="Search" onkeyup="searchProducts()">
<div id="products" class="grid"></div>
</div>
<div class="footer">
Total ₹<span id="total">0</span>
<button onclick="goOrder()">Order</button>
</div>
</div>

<!-- CART PAGE -->
<div id="cartPage" class="page hidden">
<div class="content">
<header><h3>Cart Items</h3></header>
<div id="cartItems" style="padding:10px"></div>
<button onclick="backHome()">⬅ Back</button>
</div>
</div>

<!-- LIKED PAGE -->
<div id="likedPage" class="page hidden">
<div class="content">
<header><h3>Liked Items</h3></header>
<div id="likedItems" style="padding:10px"></div>
<button onclick="backHome()">⬅ Back</button>
</div>
</div>

<!-- ORDER PAGE -->
<div id="orderPage" class="page hidden">
<div class="content">
<header><h3>Place Order</h3></header>
<div id="orderItems" style="padding:10px"></div>
<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="pincode" placeholder="Pincode">
<select id="method"><option>COD</option><option>Card</option><option>UPI</option></select>
<button onclick="placeOrder()">Confirm Order</button>
<button onclick="backHome()">⬅ Back</button>
</div>
</div>

<!-- ORDERS LIST PAGE -->
<div id="ordersPage" class="page hidden">
<div class="content">
<header><h3>My Orders</h3></header>
<div id="ordersList" style="padding:10px"></div>
<button onclick="backHome()">⬅ Back</button>
</div>
</div>

<script>
// PRODUCTS
const products = [
{name:'Tomato',price:30,img:'https://via.placeholder.com/150?text=Tomato'},
{name:'Milk',price:50,img:'https://via.placeholder.com/150?text=Milk'},
{name:'Rice',price:120,img:'https://via.placeholder.com/150?text=Rice'}
];

let cart = [];
let liked = [];
let orders = []; // <- STORE ALL ORDERS

// LOGIN
function login(){
 let u=document.getElementById('user').value;
 if(u){localStorage.setItem('user',u);
 document.getElementById('login').classList.add('hidden');
 document.getElementById('home').classList.remove('hidden');
 renderProducts(products);}
}

function logout(){localStorage.clear();location.reload();}
function toggleMenu(){document.getElementById('drawer').classList.toggle('open');}

// RENDER PRODUCTS
function renderProducts(list){
 const p=document.getElementById('products'); p.innerHTML='';
 list.forEach((x,i)=>{
 let q=cart.filter(c=>c.name===x.name).length;
 let l=liked.includes(x.name)?'❤️':'🤍';
 p.innerHTML+=`<div class='card'>
 <img src='${x.img}'>
 <h4>${x.name}</h4>
 <p>₹${x.price}</p>
 <button onclick='like(${i})'>${l}</button>
 <button onclick='remove(${i})'>-</button>${q}<button onclick='add(${i})'>+</button>
 </div>`;
 });
 updateTotal();
}

function add(i){cart.push(products[i]);renderProducts(products);}
function remove(i){let idx=cart.findIndex(c=>c.name===products[i].name);if(idx>-1)cart.splice(idx,1);renderProducts(products);}
function like(i){let n=products[i].name;liked.includes(n)?liked=liked.filter(x=>x!==n):liked.push(n);renderProducts(products);}
function updateTotal(){let t=0;cart.forEach(x=>t+=x.price);document.getElementById('total').innerText=t;}
function searchProducts(){let v=document.getElementById('search').value.toLowerCase();renderProducts(products.filter(x=>x.name.toLowerCase().includes(v)));}

// PAGES
function openCart(){toggleMenu();showPage('cartPage'); renderCart();}
function openLiked(){toggleMenu();showPage('likedPage'); renderLiked();}
function openOrders(){toggleMenu();showPage('ordersPage'); renderOrders();}
function goOrder(){if(cart.length===0){alert('Add items'); return;} showPage('orderPage'); renderOrder();}
function backHome(){showPage('home');}
function showPage(id){
['home','cartPage','likedPage','orderPage','login','ordersPage'].forEach(p=>document.getElementById(p).classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
}

// RENDER CART & LIKED & ORDER
function renderCart(){let html=''; cart.forEach(p=>{html+=`<div class='card'><img src='${p.img}'><p>${p.name} - ₹${p.price}</p></div>`}); document.getElementById('cartItems').innerHTML=html;}
function renderLiked(){let html=''; liked.forEach(n=>{let p=products.find(x=>x.name===n); html+=`<div class='card'><img src='${p.img}'><p>${p.name}</p></div>`}); document.getElementById('likedItems').innerHTML=html;}
function renderOrder(){let html=''; cart.forEach(p=>{html+=`<div class='card'><img src='${p.img}'><p>${p.name} - ₹${p.price}</p></div>`}); document.getElementById('orderItems').innerHTML=html;}
function renderOrders(){let html=''; orders.forEach((o,i)=>{
 html+=`<div class='card'><p>Order #${i+1} - ₹${o.total}</p>`;
 o.items.forEach(it=>html+=`<p>${it.name} - ₹${it.price}</p>`);
 html+=`<p>Method: ${o.method}, ${o.name}, ${o.address}, ${o.pincode}</p></div>`;
 }); if(html==='') html='No orders yet.'; document.getElementById('ordersList').innerHTML=html;}

// PLACE ORDER
function placeOrder(){
 let name=document.getElementById('name').value||'Anonymous';
 let address=document.getElementById('address').value||'N/A';
 let pincode=document.getElementById('pincode').value||'000000';
 let method=document.getElementById('method').value;
 let total=cart.reduce((a,b)=>a+b.price,0);
 orders.push({items:[...cart], total, name, address, pincode, method});
 alert('Order placed successfully 🎉');
 cart=[]; updateTotal(); backHome();
}

renderProducts(products);
</script>

</div>
</body>
</html>
