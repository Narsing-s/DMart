<!DOCTYPE html>
<html>
<head>
  <title>DMart Premium Final</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:Inter;background:#f7f7f7;display:flex;justify-content:center}

    .app{
      width:100%;
      max-width:390px;
      height:100vh;
      border-radius:20px;
      overflow:hidden;
      position:relative;
      background:#f7f7f7;
      box-shadow:0 0 20px rgba(0,0,0,0.2);
    }

    .content{
      height:100%;
      overflow-y:auto;
      padding-bottom:70px;
    }

    header{background:#6c2bd9;color:#fff;padding:14px;display:flex;justify-content:space-between;align-items:center}
    .menu{font-size:22px;cursor:pointer}
    .drawer{position:fixed;left:-260px;top:0;width:260px;height:100%;background:#fff;padding:15px;transition:0.3s;z-index:1000}
    .drawer.open{left:0}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
    .card{background:#fff;border-radius:10px;padding:10px}
    img{width:100%;height:100px;object-fit:cover;border-radius:8px}
    button{background:#6c2bd9;color:#fff;border:none;padding:6px;border-radius:6px;margin:3px}
    .footer{position:absolute;bottom:0;width:100%;background:#fff;padding:10px;border-top:1px solid #ddd;z-index:999}
    input,select{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
    .hidden{display:none}

    .page{position:absolute;width:100%;top:0;left:0;height:100%;}
  </style>
</head>
<body>
<div class="app">

<div id="login" class="page">
<header><h3>Login</h3></header>
<div style="padding:15px">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="drawer" class="drawer">
  <p onclick="openLiked()">❤️ Liked</p>
  <p onclick="openCart()">🛒 Cart</p>
  <p onclick="openOrders()">📦 Orders</p>
  <p onclick="logout()">🚪 Logout</p>
</div>

<div id="home" class="page hidden">
<div class="content">
<header>
<span class="menu" onclick="toggleMenu()">☰</span>
<h3>DMart</h3>
</header>
<input id="search" placeholder="Search" onkeyup="search()">
<div id="products" class="grid"></div>
</div>
<div class="footer">
Total ₹<span id="total">0</span>
<button onclick="goOrder()">Order</button>
</div>
</div>

<div id="order" class="page hidden">
<div class="content">
<header><h3>Order Details</h3></header>
<div id="orderItems" style="padding:10px"></div>
<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="pincode" placeholder="Pincode">
<select id="method">
<option>COD</option><option>Card</option><option>UPI</option>
</select>
<button onclick="placeOrder()">Confirm Order</button>
<button onclick="backHome()">⬅ Back</button>
</div>
</div>

<script>
const products=[
{name:'Tomato',price:30,img:'https://images.unsplash.com/photo-1567306226416-28f0efdc88ce'},
{name:'Milk',price:50,img:'https://images.unsplash.com/photo-1582719478250-c89cae4dc85b'},
{name:'Rice',price:1200,img:'https://images.unsplash.com/photo-1586201375761-83865001e31c'}
];

let cart=[];
let liked=[];

function login(){
 let u=document.getElementById('user').value;
 if(u){localStorage.setItem('user',u);
 document.getElementById('login').classList.add('hidden');
 document.getElementById('home').classList.remove('hidden');
 render(products);} }

function logout(){localStorage.clear();location.reload();}
function toggleMenu(){document.getElementById('drawer').classList.toggle('open');}

function render(list){
 let p=document.getElementById('products');p.innerHTML='';
 list.forEach((x,i)=>{
 let q=cart.filter(c=>c.name===x.name).length;
 let l=liked.includes(x.name)?'❤️':'🤍';
 p.innerHTML+=`<div class='card'>
 <img src='${x.img}'>
 <h4>${x.name}</h4>
 <p>₹${x.price}</p>
 <button onclick='like(${i})'>${l}</button>
 <button onclick='remove(${i})'>-</button>${q}<button onclick='add(${i})'>+</button>
 </div>`;
 });}

function add(i){cart.push(products[i]);update();render(products);} 
function remove(i){let x=cart.findIndex(c=>c.name===products[i].name);if(x>-1)cart.splice(x,1);update();render(products);} 
function like(i){let n=products[i].name;liked.includes(n)?liked=liked.filter(x=>x!==n):liked.push(n);render(products);} 

function update(){let t=0;cart.forEach(x=>t+=x.price);document.getElementById('total').innerText=t;}

function search(){let v=document.getElementById('search').value.toLowerCase();render(products.filter(x=>x.name.toLowerCase().includes(v)));}

function openLiked(){
 toggleMenu();
 document.getElementById('home').classList.add('hidden');
 document.getElementById('order').classList.remove('hidden');
 let html='<h3 style="padding:10px">Liked Items</h3>';
 liked.forEach(n=>{
   let p=products.find(x=>x.name===n);
   html+=`<div class='card'><img src='${p.img}'><p>${p.name}</p></div>`;
 });
 document.getElementById('orderItems').innerHTML=html;
}
function openCart(){
 toggleMenu();
 document.getElementById('home').classList.add('hidden');
 document.getElementById('order').classList.remove('hidden');
 let html='<h3 style="padding:10px">Cart Items</h3>';
 cart.forEach(p=>{
   html+=`<div class='card'><img src='${p.img}'><p>${p.name}</p></div>`;
 });
 document.getElementById('orderItems').innerHTML=html;
}
function openOrders(){toggleMenu();alert('Orders feature');}

function goOrder(){
 if(cart.length===0){alert('Add items');return;}
 document.getElementById('home').classList.add('hidden');
 document.getElementById('order').classList.remove('hidden');

 let html='';
 cart.forEach(p=>{
 html+=`<div class='card'><img src='${p.img}'><p>${p.name} - ₹${p.price}</p></div>`;
 });
 document.getElementById('orderItems').innerHTML=html;
}

function backHome(){
 document.getElementById('order').classList.add('hidden');
 document.getElementById('home').classList.remove('hidden');
}

function placeOrder(){
 alert('Order placed successfully 🎉');
 location.reload();
}

render(products);
</script>

</div>
</body>
</html>
